---
- name: Install Zabbix + Grafana (OLAM Clean Version)
  hosts: all
  become: yes

  collections:
    - community.mysql

  vars:
    zabbix_db: zabbix
    zabbix_user: zabbix
    zabbix_password: zabbixpass123

  tasks:

  # =========================
  # BASE SYSTEM
  # =========================
  - name: Update apt cache
    apt:
      update_cache: yes

  - name: Install base packages
    apt:
      name:
        - wget
        - gnupg
        - mysql-server
        - apache2
        - python3-pymysql
        - php
        - php-mysql
        - php-gd
        - php-xml
        - php-bcmath
        - php-mbstring
        - php-ldap
        - php-json
        - snmp
        - snmpd
      state: present

  - name: Ensure MySQL is started
    systemd:
      name: mysql
      state: started
      enabled: yes

  # =========================
  # MYSQL CONFIG (NO SHELL)
  # =========================
  - name: Create Zabbix database
    mysql_db:
      name: "{{ zabbix_db }}"
      state: present
      encoding: utf8mb4
      collation: utf8mb4_bin

  - name: Create Zabbix user
    mysql_user:
      name: "{{ zabbix_user }}"
      password: "{{ zabbix_password }}"
      priv: "{{ zabbix_db }}.*:ALL"
      host: localhost
      state: present

  # =========================
  # ZABBIX REPO
  # =========================
  - name: Download Zabbix repo package
    get_url:
      url: https://repo.zabbix.com/zabbix/7.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest+ubuntu20.04_all.deb
      dest: /tmp/zabbix-release.deb

  - name: Install Zabbix repo
    apt:
      deb: /tmp/zabbix-release.deb

  - name: Update apt cache after Zabbix repo
    apt:
      update_cache: yes

  # =========================
  # ZABBIX INSTALL
  # =========================
  - name: Install Zabbix packages
    apt:
      name:
        - zabbix-server-mysql
        - zabbix-frontend-php
        - zabbix-apache-conf
        - zabbix-sql-scripts
        - zabbix-agent
      state: present

  - name: Import Zabbix schema (idempotent safe)
    mysql_db:
      name: "{{ zabbix_db }}"
      state: import
      target: /usr/share/zabbix-sql-scripts/mysql/server.sql.gz

  - name: Configure Zabbix DB password
    lineinfile:
      path: /etc/zabbix/zabbix_server.conf
      regexp: '^DBPassword='
      line: "DBPassword={{ zabbix_password }}"

  # =========================
  # GRAFANA
  # =========================
  - name: Add Grafana repository key
    apt_key:
      url: https://apt.grafana.com/gpg.key
      state: present

  - name: Add Grafana repository
    apt_repository:
      repo: "deb https://apt.grafana.com stable main"
      state: present

  - name: Update apt cache for Grafana
    apt:
      update_cache: yes

  - name: Install Grafana
    apt:
      name: grafana
      state: present

  # =========================
  # SERVICES
  # =========================
  - name: Enable and start services
    systemd:
      name: "{{ item }}"
      state: started
      enabled: yes
    loop:
      - mysql
      - apache2
      - zabbix-server
      - zabbix-agent
      - grafana-server
