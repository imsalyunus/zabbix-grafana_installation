---
- name: Install Zabbix + Grafana on Ubuntu 20.04
  hosts: all
  become: yes

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - wget
          - gnupg
          - mysql-server
          - apache2
          - php
          - php-mysql
          - php-gd
          - php-xml
          - php-bcmath
          - php-mbstring
          - php-ldap
          - php-json
          - snmp
          - snmpd
        state: present

    - name: Download Zabbix repository package
      get_url:
        url: https://repo.zabbix.com/zabbix/7.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest+ubuntu20.04_all.deb
        dest: /tmp/zabbix-release.deb

    - name: Install Zabbix repository
      apt:
        deb: /tmp/zabbix-release.deb
        force: yes

    - name: Update apt cache again
      apt:
        update_cache: yes

    - name: Install Zabbix packages
      apt:
        name:
          - zabbix-server-mysql
          - zabbix-frontend-php
          - zabbix-apache-conf
          - zabbix-sql-scripts
          - zabbix-agent
        state: present

    - name: Install Grafana repository key
      shell: |
        wget -q -O - https://packages.grafana.com/gpg.key | apt-key add -
      args:
        executable: /bin/bash

    - name: Add Grafana repository
      shell: |
        echo "deb https://packages.grafana.com/oss/deb stable main" > /etc/apt/sources.list.d/grafana.list
      args:
        executable: /bin/bash

    - name: Update apt cache for Grafana
      apt:
        update_cache: yes

    - name: Install Grafana
      apt:
        name: grafana
        state: present

    - name: Enable and start services
      systemd:
        name: "{{ item }}"
        enabled: yes
        state: started
      loop:
        - mysql
        - apache2
        - zabbix-server
        - zabbix-agent
        - grafana-server
