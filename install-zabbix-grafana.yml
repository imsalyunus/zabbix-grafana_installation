---
- name: Install Zabbix + Grafana (Ubuntu 22.04)
  hosts: all
  vars:
    zabbix_db: zabbix
    zabbix_user: zabbix
    zabbix_password: zabbixpass123

  tasks:
  
  # =========================
  # BASE SYSTEM
  # =========================
  - name: Update apt cache
    apt:
      update_cache: yes

  - name: Install base packages
    apt:
      name:
        - wget
        - gnupg
        - mysql-server
        - apache2
        - python3-pymysql
        - php
        - php-mysql
        - php-gd
        - php-xml
        - php-bcmath
        - php-mbstring
        - php-ldap
        - php-json
        - snmp
        - snmpd
        - unzip
      state: present

  - name: Enable and start MySQL
    systemd:
      name: mysql
      state: started
      enabled: yes

  # =========================
  # MYSQL SETUP (SAFE)
  # =========================
  - name: Create Zabbix database
    ansible.mysql.mysql_db:
      name: "{{ zabbix_db }}"
      encoding: utf8mb4
      collation: utf8mb4_bin
      state: present
      login_unix_socket: /var/run/mysqld/mysqld.sock

  - name: Create Zabbix user
    ansible.mysql.mysql_user:
      name: "{{ zabbix_user }}"
      password: "{{ zabbix_password }}"
      priv: "{{ zabbix_db }}.*:ALL"
      host: localhost
      state: present
      login_unix_socket: /var/run/mysqld/mysqld.sock

  - name: Enable function creators (fix 1419 error)
    lineinfile:
      path: /etc/mysql/mysql.conf.d/mysqld.cnf
      insertafter: "[mysqld]"
      line: "log_bin_trust_function_creators = 1"

  - name: Restart MySQL
    systemd:
      name: mysql
      state: restarted

  - name: Wait MySQL ready
    wait_for:
      port: 3306
      delay: 5
      timeout: 60

  # =========================
  # ZABBIX REPO
  # =========================
  - name: Download Zabbix repo (Ubuntu 22.04)
    get_url:
      url: https://repo.zabbix.com/zabbix/6.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest+ubuntu22.04_all.deb
      dest: /tmp/zabbix-release.deb

  - name: Install repo
    apt:
      deb: /tmp/zabbix-release.deb
      force: yes

  - name: Update apt cache
    apt:
      update_cache: yes

  # =========================
  # ZABBIX INSTALL
  # =========================
  - name: Install Zabbix packages
    apt:
      name:
        - zabbix-server-mysql
        - zabbix-frontend-php
        - zabbix-apache-conf
        - zabbix-sql-scripts
        - zabbix-agent
      state: present

  # =========================
  # SAFE SCHEMA INIT
  # =========================
  - name: Check if Zabbix schema already exists
    ansible.mysql.mysql_query:
      login_user: "{{ zabbix_user }}"
      login_password: "{{ zabbix_password }}"
      login_unix_socket: /var/run/mysqld/mysqld.sock
      query: "SHOW TABLES LIKE 'users';"
      db: "{{ zabbix_db }}"

  - name: Import Zabbix schema (ONLY IF EMPTY DB)
    shell: |
      zcat /usr/share/zabbix-sql-scripts/mysql/server.sql.gz | mysql -u{{ zabbix_user }} -p{{ zabbix_password }} {{ zabbix_db }}
    when: zbx_check.query_result is not defined or zbx_check.query_result|length == 0

  # =========================
  # ZABBIX CONFIG
  # =========================
  - name: Configure Zabbix DB
    blockinfile:
      path: /etc/zabbix/zabbix_server.conf
      block: |
        DBHost=localhost
        DBName={{ zabbix_db }}
        DBUser={{ zabbix_user }}
        DBPassword={{ zabbix_password }}

  # =========================
  # START ZABBIX
  # =========================
  - name: Restart Zabbix server
    systemd:
      name: zabbix-server
      state: restarted
      enabled: yes

  - name: Restart Zabbix agent
    systemd:
      name: zabbix-agent
      state: restarted
      enabled: yes

  - name: Restart Apache
    systemd:
      name: apache2
      state: restarted
      enabled: yes

  # =========================
  # GRAFANA
  # =========================
  - name: Add Grafana key
    get_url:
      url: https://apt.grafana.com/gpg.key
      dest: /etc/apt/trusted.gpg.d/grafana.gpg

  - name: Add Grafana repo
    copy:
      dest: /etc/apt/sources.list.d/grafana.list
      content: "deb https://apt.grafana.com stable main\n"

  - name: Update apt (grafana)
    apt:
      update_cache: yes

  - name: Install Grafana
    apt:
      name: grafana
      state: present

  - name: Start Grafana
    systemd:
      name: grafana-server
      state: started
      enabled: yes

  # =========================
  # FINAL CHECK
  # =========================
  - name: Check Zabbix service status
    shell: systemctl is-active zabbix-server
    register: zbx_status

  - debug:
      msg: "Zabbix status = {{ zbx_status.stdout }}"
