---
- name: Install Zabbix + Grafana (OLAM Stable Shell Only)
  hosts: all
  become: yes

  vars:
    zabbix_db: zabbix
    zabbix_user: zabbix
    zabbix_password: zabbixpass123

  tasks:

  # =========================
  # BASE SYSTEM
  # =========================
  - name: Update apt cache
    apt:
      update_cache: yes

  - name: Install base packages
    apt:
      name:
        - wget
        - gnupg
        - mysql-server
        - apache2
        - python3-pymysql
        - php
        - php-mysql
        - php-gd
        - php-xml
        - php-bcmath
        - php-mbstring
        - php-ldap
        - php-json
        - snmp
        - snmpd
      state: present

  - name: Ensure MySQL started
    systemd:
      name: mysql
      state: started
      enabled: yes

  # =========================
  # MYSQL SETUP (SHELL ONLY)
  # =========================
  - name: Create Zabbix database
    shell: |
      mysql -e "CREATE DATABASE IF NOT EXISTS {{ zabbix_db }} CHARACTER SET utf8mb4 COLLATE utf8mb4_bin;"

  - name: Create Zabbix user
    shell: |
      mysql -e "CREATE USER IF NOT EXISTS '{{ zabbix_user }}'@'localhost' IDENTIFIED BY '{{ zabbix_password }}';"

  - name: Grant privileges
    shell: |
      mysql -e "GRANT ALL PRIVILEGES ON {{ zabbix_db }}.* TO '{{ zabbix_user }}'@'localhost'; FLUSH PRIVILEGES;"

  # =========================
  # FIX MYSQL 1419 (IMPORTANT)
  # =========================
  - name: Persist MySQL binlog setting (fix Zabbix schema error 1419)
    lineinfile:
      path: /etc/mysql/mysql.conf.d/mysqld.cnf
      insertafter: "[mysqld]"
      line: "log_bin_trust_function_creators = 1"

  - name: Restart MySQL after config change
    systemd:
      name: mysql
      state: restarted

  - name: Wait for MySQL ready
    wait_for:
      port: 3306
      delay: 5
      timeout: 60

  # =========================
  # ZABBIX REPO (6.0 LTS STABLE)
  # =========================
  - name: Download Zabbix repo
    get_url:
      url: https://repo.zabbix.com/zabbix/6.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest+ubuntu20.04_all.deb
      dest: /tmp/zabbix-release.deb

  - name: Install Zabbix repo
    apt:
      deb: /tmp/zabbix-release.deb
      force: yes

  - name: Update apt cache
    apt:
      update_cache: yes

  # =========================
  # ZABBIX INSTALL
  # =========================
  - name: Install Zabbix packages
    apt:
      name:
        - zabbix-server-mysql
        - zabbix-frontend-php
        - zabbix-apache-conf
        - zabbix-sql-scripts
        - zabbix-agent
      state: present

  # =========================
  # IMPORT SCHEMA (SAFE)
  # =========================
  - name: Check schema file exists
    stat:
      path: /usr/share/zabbix-sql-scripts/mysql/server.sql.gz
    register: zbx_schema

  - name: Import Zabbix schema
    shell: |
      zcat /usr/share/zabbix-sql-scripts/mysql/server.sql.gz | mysql --binary-mode=1 -u{{ zabbix_user }} -p{{ zabbix_password }} {{ zabbix_db }}
    when: zbx_schema.stat.exists

  # =========================
  # CONFIG ZABBIX SERVER
  # =========================
  - name: Configure Zabbix DB settings
    shell: |
      sed -i 's/^# DBHost=.*/DBHost=localhost/' /etc/zabbix/zabbix_server.conf
      sed -i 's/^# DBName=.*/DBName={{ zabbix_db }}/' /etc/zabbix/zabbix_server.conf
      sed -i 's/^# DBUser=.*/DBUser={{ zabbix_user }}/' /etc/zabbix/zabbix_server.conf
      sed -i 's/^# DBPassword=.*/DBPassword={{ zabbix_password }}/' /etc/zabbix/zabbix_server.conf

  # =========================
  # GRAFANA
  # =========================
  - name: Add Grafana repo key
    get_url:
      url: https://apt.grafana.com/gpg.key
      dest: /etc/apt/trusted.gpg.d/grafana.gpg

  - name: Add Grafana repo
    shell: |
      echo "deb https://apt.grafana.com stable main" > /etc/apt/sources.list.d/grafana.list

  - name: Update apt cache (grafana)
    apt:
      update_cache: yes

  - name: Install Grafana
    apt:
      name: grafana
      state: present

  # =========================
  # SERVICES
  # =========================
  - name: Enable and start services
    systemd:
      name: "{{ item }}"
      state: started
      enabled: yes
    loop:
      - mysql
      - apache2
      - zabbix-server
      - zabbix-agent
      - grafana-server
