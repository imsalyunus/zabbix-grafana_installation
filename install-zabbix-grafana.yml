---
- name: Install Zabbix + Grafana (Shell Only - OLAM Safe)
  hosts: all
  become: yes

  vars:
    zabbix_db: zabbix
    zabbix_user: zabbix
    zabbix_password: zabbixpass123

  tasks:

  # =========================
  # BASE SYSTEM
  # =========================
  - name: Update apt cache
    apt:
      update_cache: yes

  - name: Install base packages
    apt:
      name:
        - wget
        - gnupg
        - mysql-server
        - apache2
        - python3-pymysql
        - php
        - php-mysql
        - php-gd
        - php-xml
        - php-bcmath
        - php-mbstring
        - php-ldap
        - php-json
        - snmp
        - snmpd
      state: present

  - name: Ensure MySQL started
    systemd:
      name: mysql
      state: started
      enabled: yes

  # =========================
  # MYSQL (SHELL ONLY)
  # =========================
  - name: Create Zabbix database
    shell: |
      mysql -e "CREATE DATABASE IF NOT EXISTS {{ zabbix_db }} CHARACTER SET utf8mb4 COLLATE utf8mb4_bin;"

  - name: Create Zabbix user (safe)
    shell: |
      mysql -e "CREATE USER IF NOT EXISTS 'zabbix'@'localhost' IDENTIFIED BY '{{ zabbix_password }}';"

  - name: Grant privileges
    shell: |
      mysql -e "GRANT ALL PRIVILEGES ON zabbix.* TO 'zabbix'@'localhost'; FLUSH PRIVILEGES;"

  # =========================
  # ZABBIX REPO
  # =========================
  - name: Download Zabbix repo
    get_url:
      url: https://repo.zabbix.com/zabbix/7.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest+ubuntu20.04_all.deb
      dest: /tmp/zabbix-release.deb

  - name: Install Zabbix repo
    apt:
      deb: /tmp/zabbix-release.deb

  - name: Update apt cache
    apt:
      update_cache: yes

  # =========================
  # ZABBIX INSTALL
  # =========================
  - name: Install Zabbix packages
    apt:
      name:
        - zabbix-server-mysql
        - zabbix-frontend-php
        - zabbix-apache-conf
        - zabbix-sql-scripts
        - zabbix-agent
      state: present

  - name: Import Zabbix schema
    shell: |
      zcat /usr/share/zabbix-sql-scripts/mysql/server.sql.gz | mysql -u{{ zabbix_user }} -p{{ zabbix_password }} {{ zabbix_db }}

  - name: Configure DB password
    shell: |
      sed -i 's/^# DBPassword=.*/DBPassword={{ zabbix_password }}/' /etc/zabbix/zabbix_server.conf

  # =========================
  # GRAFANA
  # =========================
  - name: Add Grafana key
    shell: |
      wget -q -O - https://apt.grafana.com/gpg.key | apt-key add -

  - name: Add Grafana repo
    shell: |
      echo "deb https://apt.grafana.com stable main" > /etc/apt/sources.list.d/grafana.list

  - name: Update apt cache (grafana)
    apt:
      update_cache: yes

  - name: Install Grafana
    apt:
      name: grafana
      state: present

  # =========================
  # SERVICES
  # =========================
  - name: Enable and start services
    systemd:
      name: "{{ item }}"
      state: started
      enabled: yes
    loop:
      - mysql
      - apache2
      - zabbix-server
      - zabbix-agent
      - grafana-server
