---
- name: Zabbix + Grafana FULL STACK STABLE (FIXED)
  hosts: all
  become: yes

  vars:
    zabbix_db: zabbix
    zabbix_user: zabbix
    zabbix_password: zabbixpass123

  tasks:

  # =========================
  # BASE SYSTEM
  # =========================
  - name: Update apt cache
    apt:
      update_cache: yes

  - name: Install base packages
    apt:
      name:
        - wget
        - gnupg
        - mysql-server
        - apache2
        - python3-pymysql
        - php
        - php-mysql
        - php-gd
        - php-xml
        - php-bcmath
        - php-mbstring
        - php-ldap
        - php-json
        - snmp
        - snmpd
        - unzip
      state: present

  - name: Enable and start MySQL
    systemd:
      name: mysql
      state: started
      enabled: yes

  # =========================
  # MYSQL SETUP (SAFE)
  # =========================
  - name: Create DB
    shell: |
      mysql -e "CREATE DATABASE IF NOT EXISTS {{ zabbix_db }} CHARACTER SET utf8mb4 COLLATE utf8mb4_bin;"

  - name: Create user
    shell: |
      mysql -e "CREATE USER IF NOT EXISTS '{{ zabbix_user }}'@'localhost' IDENTIFIED BY '{{ zabbix_password }}';"

  - name: Grant privileges
    shell: |
      mysql -e "GRANT ALL PRIVILEGES ON {{ zabbix_db }}.* TO '{{ zabbix_user }}'@'localhost'; FLUSH PRIVILEGES;"

  - name: Enable function creators (fix 1419 error)
    lineinfile:
      path: /etc/mysql/mysql.conf.d/mysqld.cnf
      insertafter: "[mysqld]"
      line: "log_bin_trust_function_creators = 1"

  - name: Restart MySQL
    systemd:
      name: mysql
      state: restarted

  - name: Wait MySQL ready
    wait_for:
      port: 3306
      delay: 5
      timeout: 60

  # =========================
  # ZABBIX REPO
  # =========================
  - name: Download Zabbix repo
    get_url:
      url: https://repo.zabbix.com/zabbix/6.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest+ubuntu20.04_all.deb
      dest: /tmp/zabbix-release.deb

  - name: Install repo
    apt:
      deb: /tmp/zabbix-release.deb
      force: yes

  - name: Update apt cache
    apt:
      update_cache: yes

  # =========================
  # ZABBIX INSTALL
  # =========================
  - name: Install Zabbix packages
    apt:
      name:
        - zabbix-server-mysql
        - zabbix-frontend-php
        - zabbix-apache-conf
        - zabbix-sql-scripts
        - zabbix-agent
      state: present

  # =========================
  # SAFE SCHEMA INIT (MARKER FILE)
  # =========================
  - name: Check initialization marker
    stat:
      path: /var/lib/zabbix/.db_initialized
    register: zbx_init

  - name: Check if Zabbix schema already exists
    shell: |
      mysql -uzabbix -p{{ zabbix_password }} -e "USE zabbix; SHOW TABLES LIKE 'users';"
    register: zbx_check
    ignore_errors: yes
  
  - name: Import Zabbix schema (ONLY IF EMPTY DB)
    shell: |
      zcat /usr/share/zabbix-sql-scripts/mysql/server.sql.gz | mysql -uzabbix -p{{ zabbix_password }} zabbix
    when: zbx_check.rc != 0

  - name: Ensure Zabbix var lib directory exists
    file:
      path: /var/lib/zabbix
      state: directory
      owner: zabbix
      group: zabbix
      mode: '0755'

  - name: Create init marker
    file:
      path: /var/lib/zabbix/.db_initialized
      state: touch

  # =========================
  # ZABBIX CONFIG CLEAN
  # =========================
  - name: Configure Zabbix DB
    blockinfile:
      path: /etc/zabbix/zabbix_server.conf
      block: |
        DBHost=localhost
        DBName={{ zabbix_db }}
        DBUser={{ zabbix_user }}
        DBPassword={{ zabbix_password }}

  # =========================
  # START ZABBIX
  # =========================
  - name: Restart Zabbix server
    systemd:
      name: zabbix-server
      state: restarted
      enabled: yes

  - name: Restart Zabbix agent
    systemd:
      name: zabbix-agent
      state: restarted
      enabled: yes

  - name: Restart Apache
    systemd:
      name: apache2
      state: restarted
      enabled: yes

  # =========================
  # GRAFANA
  # =========================
  - name: Add Grafana key
    get_url:
      url: https://apt.grafana.com/gpg.key
      dest: /etc/apt/trusted.gpg.d/grafana.gpg

  - name: Add Grafana repo
    shell: |
      echo "deb https://apt.grafana.com stable main" > /etc/apt/sources.list.d/grafana.list

  - name: Update apt (grafana)
    apt:
      update_cache: yes

  - name: Install Grafana
    apt:
      name: grafana
      state: present

  - name: Start Grafana
    systemd:
      name: grafana-server
      state: started
      enabled: yes

  # =========================
  # FINAL CHECK
  # =========================
  - name: Check Zabbix service status
    shell: systemctl is-active zabbix-server
    register: zbx_status

  - debug:
      msg: "Zabbix status = {{ zbx_status.stdout }}"
